{% extends "layouts/main.html" %}

{% block title %}{{ action == 'edit' and 'Editar Produto' or 'Novo Produto' }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <div class="d-flex align-items-center gap-2 mb-4">
        <i class="fa-solid fa-box fa-lg text-success"></i>
        <h4 class="mb-0 fw-semibold">{{ action == 'edit' and 'Editar Produto' or 'Novo Produto' }}</h4>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form id="form">
                <input type="hidden" id="id" name="id">
                <input type="hidden" id="action" name="action">

                <!-- Nome -->
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="nome" name="nome" placeholder="Nome" autofocus>
                            <label for="nome"><i class="fa-solid fa-box me-1"></i>Nome do Produto</label>
                        </div>
                    </div>
                </div>

                <!-- Código de Barras + Unidade -->
                <div class="row g-3 mb-3">
                    <div class="col-md-8">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="codigo_barra" name="codigo_barra" placeholder="Código de Barras">
                            <label for="codigo_barra"><i class="fa-solid fa-barcode me-1"></i>Código de Barras</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="unidade" name="unidade" placeholder="Unidade">
                            <label for="unidade"><i class="fa-solid fa-ruler me-1"></i>Unidade (ex: UN, KG)</label>
                        </div>
                    </div>
                </div>

                <!-- Preços -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="number" class="form-control" id="preco_compra" name="preco_compra" placeholder="Preço de Compra" step="0.0001" min="0">
                            <label for="preco_compra"><i class="fa-solid fa-tag me-1"></i>Preço de Compra</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="number" class="form-control" id="preco_venda" name="preco_venda" placeholder="Preço de Venda" step="0.0001" min="0">
                            <label for="preco_venda"><i class="fa-solid fa-tag me-1"></i>Preço de Venda</label>
                        </div>
                    </div>
                </div>

                <!-- Descrição -->
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <div class="form-floating">
                            <textarea class="form-control" id="descricao" name="descricao" placeholder="Descrição" style="height: 80px;"></textarea>
                            <label for="descricao"><i class="fa-solid fa-align-left me-1"></i>Descrição</label>
                        </div>
                    </div>
                </div>

                <!-- Ativo -->
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true" checked>
                            <label class="form-check-label fw-medium" for="ativo">Produto Ativo</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-success px-4" id="insert">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Salvar
                    </button>
                    <button type="button" class="btn btn-outline-secondary px-4" onclick="window.close()">
                        <i class="fa-solid fa-xmark me-2"></i>Cancelar
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/product.js"></script>
{% endblock %}
